<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 28" role="img" aria-label="Payment methods: Visa, Mastercard, Amex, PayPal">
  <!-- VISA -->
  <rect x="0" y="2" width="40" height="24" rx="4" fill="#1A1F71"/>
  <text x="20" y="18" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">VISA</text>

  <!-- Mastercard -->
  <rect x="46" y="2" width="40" height="24" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <circle cx="62" cy="14" r="8" fill="#EB001B" opacity=".9"/>
  <circle cx="74" cy="14" r="8" fill="#F79E1B" opacity=".9"/>
  <ellipse cx="68" cy="14" rx="3" ry="7" fill="#FF5F00" opacity=".7"/>

  <!-- Amex -->
  <rect x="92" y="2" width="40" height="24" rx="4" fill="#007BC1"/>
  <text x="112" y="18" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing=".5">AMEX</text>

  <!-- PayPal -->
  <rect x="138" y="2" width="60" height="24" rx="4" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="163" y="15" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#003087" text-anchor="middle">Pay</text>
  <text x="175" y="15" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#009cde" text-anchor="middle">Pal</text>
</svg>
